{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-warning text-dark">
                    <h3 class="mb-0"> Editar Livro: {{ livro.titulo }}</h3>
                </div>
                <div class="card-body">
                    
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }}">{{ message }}</div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form action="{{ url_for('acervo.editar_livro', id=livro.id) }}" method="POST">
                        
                        <div class="mb-3">
                            <label for="titulo" class="form-label">Título do Livro</label>
                            <input type="text" class="form-control" id="titulo" name="titulo" value="{{ livro.titulo }}" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="autor" class="form-label">Autor</label>
                                <input type="text" class="form-control" id="autor" name="autor" value="{{ livro.autor }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="categoria" class="form-label">Categoria / Gênero</label>
                                <input type="text" class="form-control" id="categoria" name="categoria" value="{{ livro.categoria }}" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="isbn" class="form-label">ISBN</label>
                                <input type="text" class="form-control" id="isbn" name="isbn" value="{{ livro.isbn }}" required>
                            </div>
                            
   
    
    <div class="col-md-6">
        <label for="editora" class="form-label ">Editora</label>
        <input type="text" class="form-control" id="editora" name="editora"  value="{{ livro.editora if livro else '' }}">
    </div>

                            <div class="col-md-6 mb-3">
                                <label for="quantidade" class="form-label">Quantidade Total em Estoque</label>
                                <input type="number" class="form-control" id="quantidade" name="quantidade" value="{{ livro.quantidade_total }}" min="0" required>
                                
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('acervo.lista_livros') }}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-warning">Salvar Alterações</button>
                            
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
