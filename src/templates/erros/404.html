{% extends 'base.html' %}

{% block title %}Página Não Encontrada - LibraryGet{% endblock %}

{% block content %}
<div class="container my-5 py-5">
    <div class="row justify-content-center text-center">
        <div class="col-md-6">
            <div class="display-1 text-muted mb-3">🔍</div>
            <h1 class="display-4 fw-bold text-dark mb-3">Erro 404</h1>
            <h3 class="text-secondary mb-4">Página Não Encontrada</h3>
            <p class="text-muted mb-5">
                O link que você tentou acessar não existe, foi removido ou a URL foi digitada incorretamente.
            </p>
            
            <a href="{% if 'usuario_id' in session %}{{ url_for('auth.redirecionar_painel') }}{% else %}{{ url_for('auth.login') }}{% endif %}" class="btn btn-primary btn-lg shadow-sm">
                Voltar para o Início
            </a>
        </div>
    </div>
</div>
{% endblock %}
